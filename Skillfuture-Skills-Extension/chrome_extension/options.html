<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillsFuture Analyzer Options</title>
  <style>
    body {
      margin: 0;
      color: #111827;
      background: #f8fafc;
      font: 14px/1.45 Arial, sans-serif;
    }
    main {
      max-width: 620px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 20px;
      line-height: 1.2;
    }
    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    button {
      border: 0;
      border-radius: 6px;
      background: #075985;
      color: #ffffff;
      cursor: pointer;
      font: 700 14px/1 Arial, sans-serif;
      padding: 10px 13px;
    }
    #status {
      color: #166534;
      min-height: 20px;
    }
    p {
      max-width: 520px;
      color: #475569;
    }
  </style>
</head>
<body>
  <main>
    <h1>SkillsFuture Analyzer Options</h1>
    <label for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="url" placeholder="http://localhost:8000/analyze-job">
    <label for="apiAccessToken" style="margin-top: 16px;">Backend access token</label>
    <input id="apiAccessToken" type="password" autocomplete="off" placeholder="Optional">
    <div class="settings-grid">
      <div>
        <label for="retryCount">Network retries</label>
        <input id="retryCount" type="number" min="0" max="3" step="1" value="1">
      </div>
      <div>
        <label for="timeoutSeconds">Request timeout (seconds)</label>
        <input id="timeoutSeconds" type="number" min="5" max="120" step="1" value="45">
      </div>
    </div>
    <div class="actions">
      <button id="save" type="button">Save</button>
      <span id="status" role="status"></span>
    </div>
    <p>The access token must match API_ACCESS_TOKEN in config.py when backend authentication is enabled. Retries apply to network failures, rate limits, and temporary server errors.</p>
  </main>
  <script src="options.js"></script>
</body>
</html>
